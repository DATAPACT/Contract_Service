services:
  mongo:
    image: mongo:7
    container_name: mongodb_contract
    command: ["--auth"]
    ports:
      - "27088:27017"              # host:container (keep for Compass etc.)
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    volumes:
      - mongo_data_contract:/data/db
    restart: unless-stopped

  api:
    build: .
    container_name: contract_service_api
    ports:
      - "8866:8866"
    env_file:
      - .env
    environment:
      MONGO_HOST: mongo                 # service name
      MONGO_PORT: 27017                 # container port, NOT 27018
      MONGO_DB: ${MONGO_DB:-dips_services}
      MONGO_AUTH_SOURCE: ${MONGO_AUTH_SOURCE:-admin}
      # OR: pass a single URI and ignore MONGO_PORT entirely:
      # MONGO_URI: "mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongo:27017/${MONGO_DB:-dips_services}?authSource=${MONGO_AUTH_SOURCE:-admin}"
    depends_on:
      - mongo
    restart: unless-stopped

volumes:
  mongo_data_contract:

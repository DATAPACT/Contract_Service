services:
  mongo:
    image: mongo:7
    command: ["--auth"]
    ports: ["27018:27017"]              # host:container (keep for Compass etc.)
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    volumes: ["mongo_data:/data/db"]

  api:
    build: .
    ports: ["8866:8866"]
    env_file: [.env]
    container_name: contract_service_api 
    environment:
      MONGO_HOST: mongo                 # service name
      MONGO_PORT: 27017                 # container port, NOT 27018
      MONGO_DB: ${MONGO_DB:-contractdb}
      MONGO_AUTH_SOURCE: ${MONGO_AUTH_SOURCE:-admin}
      # OR: pass a single URI and ignore MONGO_PORT entirely:
      # MONGO_URI: "mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongo:27017/${MONGO_DB:-contractdb}?authSource=${MONGO_AUTH_SOURCE:-admin}"
    depends_on:
      - mongo

volumes:
  mongo_data:
